{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div class="container">
        <h1>超酷的 <span>校園維護</span> 基地！🚀</h1>
        <p>學校的東西壞掉了嗎？別擔心！快來告訴我們，我們會派超厲害的維修小英雄去幫忙喔！✨</p>
        <div class="cta-group">
            <a href="/report" class="btn btn-primary">🛠️ 我要報修</a>
            <a href="/dashboard" class="btn btn-secondary">🔍 看看進度</a>
        </div>
    </div>
</section>

<section class="features">
    <div class="container grid">
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📝</div>
            <h3>簡單寫寫</h3>
            <p>只要填一點點資料，告訴我們哪裡受傷了，就像寫日記一樣簡單！</p>
        </div>
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">📸</div>
            <h3>拍張照片</h3>
            <p>幫壞掉的東西拍張美美的照片，讓維修英雄更快知道怎麼修！</p>
        </div>
        <div class="card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🌈</div>
            <h3>快樂追蹤</h3>
            <p>隨時上來看看，當看到綠色勾勾出現時，就代表修好啦！耶！</p>
        </div>
    </div>
</section>
{% endblock %}
