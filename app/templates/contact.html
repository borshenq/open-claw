{% extends "base.html" %}

{% block content %}
<section class="contact-page">
    <div class="container narrow">
        <div class="contact-header">
            <h2>聯絡我們</h2>
            <p>有任何問題嗎？我們很樂意聽取您的意見。請在下方發送訊息。</p>
        </div>

        {% if success_msg %}
        <div class="alert alert-success">
            {{ success_msg }}
        </div>
        {% endif %}

        <form action="/contact" method="post" class="contact-form">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required placeholder="您的姓名">
            </div>
            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
            </div>
            <div class="form-group">
                <label for="message">訊息</label>
                <textarea id="message" name="message" required placeholder="我們能如何協助您？" rows="5"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">發送訊息</button>
        </form>
    </div>
</section>
{% endblock %}
