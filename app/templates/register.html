{% extends "base.html" %}

{% block content %}
<section class="contact-page">
    <div class="container narrow">
        <div class="contact-header">
            <h2>註冊</h2>
            <p>建立帳號以報修並追蹤進度。</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            {{ error }}
        </div>
        {% endif %}

        <form action="/register" method="post" class="contact-form">
            <div class="form-group">
                <label for="username">使用者名稱</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="role">身分</label>
                <select name="role" id="role" class="form-select">
                    <option value="Reporter">報修者 (學生/教職員)</option>
                    <option value="Technician">技術員 (管理員)</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">註冊</button>
        </form>
        <p class="text-center mt-1">已經有帳號了？ <a href="/login">在此登入</a></p>
    </div>
</section>
{% endblock %}
