model_list:
  - model_name: flora-brain-hq # PC GPU (最強大)
    litellm_params:
      model: ollama/gemma3:4b
      api_base: "http://192.60.1.110:11434/v1"
      provider: "ollama"
      api_key: "not-needed"
    model_info:
      id: "pc-gpu"
      priority: 1

  - model_name: flora-brain-hq-phone # 紅米手機 (奇兵 - 2b)
    litellm_params:
      model: ollama/qwen3.5:2b
      api_base: "http://100.87.140.52:11434/v1"
      provider: "ollama"
      api_key: "not-needed"
    model_info:
      id: "redmi-phone"
      priority: 3

  - model_name: flora-brain-hq-nas # NAS CPU (最穩定 - 4b)
    litellm_params:
      model: ollama/gemma3:4b
      api_base: "http://host.docker.internal:11434/v1"
      provider: "ollama"
      api_key: "not-needed"
    model_info:
      id: "nas-cpu"
      priority: 5

  # 🚀 Gemini 模擬模式：將所有 Gemini 請求導向本地最強算力 (PC)
  - model_name: gemini-1.5-flash
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: "http://192.60.1.110:11434/v1"
    model_info:
      id: "gemini-alias-pc"

  - model_name: gemini-1.5-pro
    litellm_params:
      model: ollama/qwen3.5:latest
      api_base: "http://192.60.1.110:11434/v1"
    model_info:
      id: "gemini-pro-alias-pc"

router_settings:
  routing_strategy: "latency-based-routing"
  enable_pre_call_checks: true
